services:
  db:
    image: postgres:17-alpine
    container_name: cj_taxi_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: taxi
      POSTGRES_PASSWORD: taxi
      POSTGRES_DB: taxi
    ports:
      - "5432:5432"
    volumes:
      - cj_taxi_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taxi -d taxi"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  cj_taxi_pgdata:
